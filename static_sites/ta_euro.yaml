name: Transformative Agreements - Euro
slug: ta_euro
tagline: "Transformative Agreements - Euro"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv
level: bund
dataset: euro
default: institution

hierarchies:
    institution:
        name: Institution
        cube: ta_euro
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_num_articles'
            type: 'aggregate'
            format: 'number'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true   
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'opt_out'
            name: 'Opt Out'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true            
        drilldowns:
            - institution
            - contract_name
            - journal_full_title
            - doi
            - cost_type
    publisher:
        name: Publisher
        cube: ta_euro
        primary_aggregate: apc_amount_sum
