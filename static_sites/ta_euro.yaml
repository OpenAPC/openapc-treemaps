            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true   
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'opt_out'
            name: 'Opt Out'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
        drilldowns:
            - publisher
