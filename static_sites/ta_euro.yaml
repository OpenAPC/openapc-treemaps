name: Transformative Agreements - Euro
slug: ta_euro
tagline: "Transformative Agreements - Euro"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv
level: bund
dataset: euro
default: institution
intro_note: 'This treemap visualises all cost data related to OA transformative agreements (or contracts in general). The data is drawn from two different data sets: The <a href="https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv">OpenAPC TA article collection</a> and the <a href="https://github.com/OpenAPC/openapc-de/blob/master/data/contracts.csv">OpenAPC contracts collection</a>, and groups of articles in the former are linked to contract records in the latter via a common group_id. The following points are important to keep in mind when exploring this treemap:
<ul>
 <li>Some articles in the TA collection already have costs assigned (Example: Gold OA articles published under the German DEAL agreements). These records are directly imported into the treemap without further modification. You may filter for these article with <strong>Cost Type = APC</strong>.</li>
 <li>If an institution reports cost data on a contract without providing metadata on articles published under that agreement, the contract is still displayed as a cost block, but without further subdivison on lower levels. These elements are labeled NO ARTICLE LEVEL DATA.</li>
 <li>When articles without cost data are linked to a contract with cost data, the contract costs are evenly distributed to all linked articles. This principle is known as an "Equivalent APC" (or EAPC) and aims to make costs for articles under transformative agreements comparable to regular APCs. You may filter for these article with <strong>Cost Type = Equivalent APC</strong></li>
 <li>Records without any cost data (neither on contract nor on article level) will not show up here, they are visualised in the <a href="/apcdata/ta-count">TA Count treemap</a> instead.</li>
</ul>'

hierarchies:
    institution:
        name: Institution
        cube: ta_euro
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_num_articles'
            type: 'aggregate'
            format: 'number'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true   
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'opt_out'
            name: 'Opt Out'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true            
        drilldowns:
            - institution
            - contract_name
            - journal_full_title
            - doi
            - cost_type
