name: OpenAPC 
slug: openapc
tagline: "Open APC - Full Dataset"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/apc_de.csv
level: bund
dataset: openapc
default: institution
intro_note: 'This treemap visualises cost data on Open Access journal articles (APCs). Since switching to a new data model in OpenAPC v5 (February 2026), this visualisation is also based on article-level cost data from transformative agreements, which might not conform to the "traditional" definition of an APC in all cases. You may change this behavior using the <strong>Origin</strong> filter, setting it to <strong>APC DATA</strong> emulates the pre-v5 approach.'

hierarchies:
    institution:
        name: Institution
        cube: openapc
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_num_articles'
            type: 'aggregate'
            format: 'number'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true   
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
          - field: 'origin'
            name: 'Origin'
            nullable: true
        drilldowns:
            - institution
            - journal_full_title
            - doi
            - cost_type
    publisher:
        name: Publisher
        cube: openapc
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_num_articles'
            type: 'aggregate'
            format: 'number'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true               
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
          - field: 'origin'
            name: 'Origin'
            nullable: true
        drilldowns:
            - publisher
            - journal_full_title
            - institution
            - doi
            - cost_type
    journal:
        name: Journal
        cube: openapc
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_num_articles'
            type: 'aggregate'
            format: 'number'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'cost_type'
            name: 'Cost Type'
            nullable: true   
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
          - field: 'origin'
            name: 'Origin'
            nullable: true
        drilldowns:
            - journal_full_title
            - institution
            - doi
            - cost_type
