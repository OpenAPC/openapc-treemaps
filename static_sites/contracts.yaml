name: Contracts
slug: contracts
tagline: "DEAL data"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv
level: bund
dataset: contracts
default: institution
intro_note: 'This treemap visualises cost data for contracts'

hierarchies:
    institution:
        name: Contracts
        cube: contracts
        primary_aggregate: apc_amount_sum
        table_items:
          - name: 'apc_amount_sum'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_avg'
            type: 'aggregate'
            format: 'monetary'
          - name: 'apc_amount_stddev'
            type: 'aggregate'
            format: 'monetary'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'apc_amount_sum'
            label: 'Percentage'
        filters:
          - field: 'country'
            name: 'Country'
            nullable: true
          - field: 'period'
            name: 'Year'
            nullable: true
        drilldowns:
            - contract_name
            - institution
            - cost_type
