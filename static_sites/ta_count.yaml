name: Transformative Agreements - Count
slug: ta_count
tagline: "Transformative Agreements - Count"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv
level: bund
dataset: ta_count
default: institution

hierarchies:
    institution:
        name: Institution
        cube: ta_count
        primary_aggregate: num_items
        table_items:
          - name: 'num_items'
            type: 'aggregate'
            format: 'number'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'num_items'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
        drilldowns:
            - institution
            - journal_full_title
            - doi
    publisher:
        name: Publisher
        cube: ta_count
        primary_aggregate: num_items
        table_items:
          - name: 'num_items'
