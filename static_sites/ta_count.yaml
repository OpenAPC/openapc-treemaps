name: Transformative Agreements - Count
slug: ta_count
tagline: "Transformative Agreements - Count"
source: Open APC
source_url: https://github.com/OpenAPC/openapc-de
data_url: https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv
level: bund
dataset: ta_count
default: institution
intro_note: 'This treemap visualises data related to OA transformative agreements (or contracts in general). The data is drawn from two different data sets: The <a href="https://github.com/OpenAPC/openapc-de/blob/master/data/transformative_agreements/transformative_agreements.csv">OpenAPC TA article collection</a> and the <a href="https://github.com/OpenAPC/openapc-de/blob/master/data/contracts.csv">OpenAPC contracts collection</a>, and groups of articles in the former are linked to contracts records in the latter via a common group_id.</br>In contrast to almost all other OpenAPC treemaps, this visualisation is based on article counts as metric (instead of cost data in Euro). It displays all articles associated with transformative agreements, including those for which no article- or contract-level cost information is reported, providing a comprehensive overview of publications reported to OpenAPC under transformative agreements.'

hierarchies:
    institution:
        name: Institution
        cube: ta_count
        primary_aggregate: num_items
        table_items:
          - name: 'num_items'
            type: 'aggregate'
            format: 'number'
          - name: 'percentage'
            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'num_items'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
        drilldowns:
            - institution
            - journal_full_title
            - doi
    publisher:
        name: Publisher
        cube: ta_count
        primary_aggregate: num_items
        table_items:
