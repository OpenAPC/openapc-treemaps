            type: 'total_percentage'
            format: 'percentage'
            relates_to: 'num_items'
            label: 'Percentage'
        filters:
          - field: 'period'
            name: 'Year'
            nullable: true
          - field: 'is_hybrid'
            name: 'Hybrid Status'
            nullable: true
          - field: 'country'
            name: 'Country'
            nullable: true
        drilldowns:
            - publisher
            - journal_full_title
            - institution
            - doi
    journal:
        name: Journal
        cube: ta_count
